_schema-version: "3.3"
ID: employee-cap
description: A simple CAP project.
version: 1.0.0
modules:
- name: employee1-cap-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: employee1-cap-auth
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
- name: employee1-cap-db-deployer
  type: hdb
  path: gen/db
- name: employee-cap-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: employee-cap-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - demoememployee.zip
      name: demoememployee
      target-path: resources/
- name: demoememployee
  type: html5
  path: app/employee
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: employee1-db
  type: com.sap.xs.hdi-container
- name: employee1-cap-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: employee1-cap-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: employee-cap-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: employee-cap-html5-service
    service-plan: app-host
- name: employee-cap-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: employee-cap-destination-service
    service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
